name: Validate Spec

on:
  workflow_call:
    inputs:
      tier:
        description: 'Spec validation tier'
        required: false
        type: number
        default: 2

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: actions/checkout@v6
        with:
          repository: towlion/platform
          path: _platform
        continue-on-error: true

      - name: Run spec validator
        if: success()
        run: python _platform/validator/validate.py --tier ${{ inputs.tier }} --dir .
