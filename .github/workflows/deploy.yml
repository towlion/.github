name: Deploy

on:
  workflow_call:
    inputs:
      caddyfile-template:
        description: 'Caddyfile template with __APP_DOMAIN__, __APP_NAME__ placeholders'
        required: true
        type: string
      use-deployment-api:
        description: 'Create GitHub deployment status'
        required: false
        type: boolean
        default: true
    secrets:
      SERVER_HOST:
        required: true
      SERVER_USER:
        required: true
      SERVER_SSH_KEY:
        required: true
      APP_DOMAIN:
        required: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create deployment
        if: inputs.use-deployment-api
        id: deployment
        uses: actions/github-script@v7
        with:
          script: |
            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.sha,
              environment: 'production',
              auto_merge: false,
              required_contexts: [],
              description: `Deploy ${context.sha.substring(0, 7)} to production`
            });
            return deployment.data.id;

      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        env:
          CADDYFILE_TEMPLATE: ${{ inputs.caddyfile-template }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          envs: CADDYFILE_TEMPLATE
          script: |
            APP_NAME="${{ github.event.repository.name }}"
            APP_DOMAIN="${{ secrets.APP_DOMAIN }}"
            APP_DIR="/opt/apps/${APP_NAME}"

            # Resolve Caddyfile template placeholders
            CADDYFILE_CONTENT=$(echo "${CADDYFILE_TEMPLATE}" \
              | sed "s|__APP_DOMAIN__|${APP_DOMAIN}|g" \
              | sed "s|__APP_NAME__|${APP_NAME}|g")

            # Determine active slot to use correct container name in Caddyfile
            SLOT_FILE="${APP_DIR}/.deploy-slot"
            if [ -f "$SLOT_FILE" ]; then
              CURRENT_SLOT=$(cat "$SLOT_FILE")
            else
              CURRENT_SLOT="blue"
            fi
            # The deploy script will use the NEXT slot
            if [ "$CURRENT_SLOT" = "blue" ]; then
              NEXT_SLOT="green"
            else
              NEXT_SLOT="blue"
            fi

            # Update container name in Caddyfile to use slotted name
            # Replace APP_NAME-app-1 with APP_NAME-NEXT_SLOT-app-1
            CADDYFILE_CONTENT=$(echo "$CADDYFILE_CONTENT" \
              | sed "s|${APP_NAME}-app-1|${APP_NAME}-${NEXT_SLOT}-app-1|g")

            # Use blue-green deploy script
            DEPLOY_SCRIPT="/opt/platform/infrastructure/deploy-blue-green.sh"
            if [ ! -f "$DEPLOY_SCRIPT" ]; then
              echo "ERROR: deploy-blue-green.sh not found at $DEPLOY_SCRIPT"
              echo "Re-run bootstrap-server.sh to install the latest infrastructure scripts."
              exit 1
            fi

            bash "$DEPLOY_SCRIPT" "$APP_NAME" "$APP_DIR" "$APP_DOMAIN" "$CADDYFILE_CONTENT"

      - name: Update deployment status (success)
        if: success() && inputs.use-deployment-api
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: ${{ steps.deployment.outputs.result }},
              state: 'success',
              environment_url: `https://${{ secrets.APP_DOMAIN }}`,
              description: 'Deployment succeeded'
            });

      - name: Update deployment status (failure)
        if: failure() && inputs.use-deployment-api
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: ${{ steps.deployment.outputs.result }},
              state: 'failure',
              description: 'Deployment failed'
            });
